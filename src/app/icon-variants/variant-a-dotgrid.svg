<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Variant A: Editorial dot grid. Nine-dot mark referencing an
       index card of information the assistant keeps. One saturated
       dot breaks the pattern to signal the live/active entry. -->
  <rect width="32" height="32" rx="7" fill="#efe3cc"/>
  <g fill="#a54a2c">
    <circle cx="9"  cy="9"  r="1.6"/>
    <circle cx="16" cy="9"  r="1.6"/>
    <circle cx="23" cy="9"  r="1.6"/>
    <circle cx="9"  cy="16" r="1.6"/>
    <circle cx="23" cy="16" r="1.6" opacity="0.55"/>
    <circle cx="9"  cy="23" r="1.6" opacity="0.55"/>
    <circle cx="16" cy="23" r="1.6" opacity="0.55"/>
    <circle cx="23" cy="23" r="1.6" opacity="0.55"/>
  </g>
  <circle cx="16" cy="16" r="2.4" fill="#ff5600"/>
</svg>
